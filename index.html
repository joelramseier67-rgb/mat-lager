<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MAT.LAGER</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f6690">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root{
    --bg:#f3f5f7;
    --panel:#ffffff;
    --panel-alt:#eef1f4;
    --accent:#2f6690;
    --accent-dim:#a9c3d4;
    --blue:#2f6690;
    --danger:#c0392b;
    --success:#2f9e5c;
    --text:#1f2933;
    --text-muted:#69737d;
    --border:#dde2e7;
    --on-accent:#ffffff;
    --disp:'Space Grotesk',sans-serif;
    --mono:'IBM Plex Mono',monospace;
    --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--bg);
    position:relative;
  }
  .hazard-strip{
    height:6px;
    width:100%;
    background:repeating-linear-gradient(135deg, var(--accent) 0 10px, #1c3b52 10px 20px);
    flex-shrink:0;
  }
  header{
    padding:18px 20px 14px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .brand{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  .brand h1{
    font-family:var(--disp);
    font-size:22px;
    font-weight:700;
    letter-spacing:0.5px;
    margin:0;
  }
  .brand h1 span{color:var(--accent);}
  .brand .count{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-muted);
    border:1px solid var(--border);
    padding:3px 8px;
    border-radius:3px;
  }
  .conn-dot{
    display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--text-muted);margin-right:5px;
  }
  .conn-dot.ok{background:var(--success);}
  .conn-dot.err{background:var(--danger);}
  main{
    flex:1;
    overflow-y:auto;
    padding:16px 16px 90px;
  }
  nav.tabs{
    position:sticky;
    bottom:0;
    display:flex;
    background:var(--panel);
    border-top:1px solid var(--border);
    flex-shrink:0;
  }
  nav.tabs button{
    flex:1;
    background:none;
    border:none;
    color:var(--text-muted);
    font-family:var(--body);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.3px;
    padding:10px 4px 12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    cursor:pointer;
  }
  nav.tabs button.active{color:var(--accent);}
  nav.tabs svg{width:20px;height:20px;}

  .stat-row{display:flex;gap:10px;margin-bottom:18px;}
  .stat-card{
    flex:1;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 14px;
  }
  .stat-card .num{font-family:var(--disp);font-size:26px;font-weight:700;}
  .stat-card.warn .num{color:var(--danger);}
  .stat-card .label{font-size:11px;color:var(--text-muted);margin-top:2px;}

  h2.section-title{
    font-family:var(--disp);
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--text-muted);
    margin:0 0 10px;
  }

  .tag-card{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:2px;
    margin-bottom:10px;
    padding:12px 14px 12px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    clip-path:polygon(0 10px, 10px 0, 100% 0, 100% 100%, 0 100%);
  }
  .tag-card::before{
    content:'';
    position:absolute;
    left:6px;top:6px;
    width:4px;height:4px;
    border-radius:50%;
    background:var(--border);
  }
  .tag-card.low{border-left:3px solid var(--danger);}
  .tag-card .info{flex:1;min-width:0;}
  .tag-card .name{font-weight:600;font-size:14.5px;margin-bottom:3px;}
  .tag-card .meta{font-family:var(--mono);font-size:11px;color:var(--text-muted);}
  .tag-card .stock{
    font-family:var(--mono);
    font-size:18px;
    font-weight:600;
    text-align:right;
  }
  .tag-card .stock small{display:block;font-size:9px;color:var(--text-muted);font-weight:400;}
  .tag-card.low .stock{color:var(--danger);}

  .filter-row{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding-bottom:4px;
    margin-bottom:14px;
  }
  .filter-row::-webkit-scrollbar{display:none;}
  .chip-filter{
    flex-shrink:0;
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text-muted);
    font-family:var(--body);
    font-size:12.5px;
    font-weight:600;
    padding:7px 13px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
  }
  .chip-filter.active{
    background:var(--accent);
    border-color:var(--accent);
    color:var(--on-accent);
  }
  .search-bar{
    width:100%;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:6px;
    font-family:var(--body);
    font-size:14px;
    margin-bottom:14px;
  }
  .search-bar::placeholder{color:var(--text-muted);}

  .fab{
    position:fixed;
    max-width:480px;
    margin:0 auto;
    left:0;right:0;
    bottom:78px;
    display:flex;
    justify-content:flex-end;
    pointer-events:none;
    padding:0 16px;
  }
  .fab button{
    pointer-events:all;
    background:var(--accent);
    color:var(--on-accent);
    border:none;
    width:52px;height:52px;
    border-radius:50%;
    font-size:26px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(47,102,144,0.35);
  }

  .btn{
    font-family:var(--body);
    font-weight:600;
    font-size:14px;
    border:none;
    border-radius:6px;
    padding:11px 16px;
    cursor:pointer;
  }
  .btn-primary{background:var(--accent);color:var(--on-accent);}
  .btn-secondary{background:var(--panel-alt);color:var(--text);border:1px solid var(--border);}
  .btn-success{background:var(--success);color:#ffffff;}
  .btn-danger{background:var(--danger);color:#ffffff;}
  .btn-block{width:100%;}
  .btn-row{display:flex;gap:8px;margin-top:14px;}
  .btn[disabled]{opacity:0.5;cursor:not-allowed;}

  label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--text-muted);
    margin:12px 0 5px;
  }
  input[type=text], input[type=number], select{
    width:100%;
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:6px;
    font-family:var(--body);
    font-size:14px;
  }

  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;align-items:flex-end;
    z-index:50;
  }
  .sheet{
    background:var(--panel);
    width:100%;
    max-width:480px;
    margin:0 auto;
    border-radius:16px 16px 0 0;
    padding:18px 20px 26px;
    max-height:88vh;
    overflow-y:auto;
    border-top:1px solid var(--border);
  }
  .sheet-head{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:4px;
  }
  .sheet-head h3{font-family:var(--disp);font-size:18px;margin:0;}
  .sheet-head .x{color:var(--text-muted);font-size:22px;cursor:pointer;background:none;border:none;}

  .stencil-id{
    font-family:var(--mono);
    font-size:12px;
    color:var(--accent);
    letter-spacing:1px;
    margin:2px 0 14px;
  }
  .qr-box{
    background:#fff;
    padding:10px;
    border-radius:8px;
    display:inline-flex;
    margin:6px 0 4px;
  }
  .detail-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:14px 0;
  }
  .detail-grid div{
    background:var(--panel-alt);
    border-radius:6px;
    padding:9px 11px;
  }
  .detail-grid .dlabel{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;}
  .detail-grid .dval{font-family:var(--mono);font-size:15px;margin-top:2px;}

  .qty-stepper{
    display:flex;align-items:center;gap:14px;
    justify-content:center;
    margin:16px 0 6px;
  }
  .qty-stepper button{
    width:40px;height:40px;border-radius:50%;
    background:var(--panel-alt);border:1px solid var(--border);
    color:var(--text);font-size:20px;cursor:pointer;
  }
  .qty-stepper .qty-val{font-family:var(--mono);font-size:24px;min-width:44px;text-align:center;}

  .scan-zone{
    display:flex;flex-direction:column;align-items:center;
    padding:36px 10px 10px;
  }
  .nfc-ring{
    width:150px;height:150px;
    border-radius:50%;
    border:2px solid var(--accent);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    margin-bottom:22px;
  }
  .nfc-ring::before, .nfc-ring::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:50%;
    border:2px solid var(--accent);
    opacity:0;
    animation:ping 2.2s ease-out infinite;
  }
  .nfc-ring::after{animation-delay:1.1s;}
  @keyframes ping{
    0%{transform:scale(0.85);opacity:0.7;}
    100%{transform:scale(1.6);opacity:0;}
  }
  .nfc-ring svg{width:56px;height:56px;color:var(--accent);}
  .scan-caption{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:1.5px;
    color:var(--text-muted);
    text-transform:uppercase;
    margin-bottom:26px;
  }
  .scan-caption.active{color:var(--accent);}
  .divider-or{
    display:flex;align-items:center;gap:10px;
    width:100%;color:var(--text-muted);font-size:11px;
    margin:22px 0 16px;
  }
  .divider-or::before, .divider-or::after{
    content:'';flex:1;height:1px;background:var(--border);
  }
  .manual-entry{width:100%;display:flex;gap:8px;}
  .manual-entry input{flex:1;}

  .qr-scan-wrap{
    position:relative;
    width:100%;
    margin-top:10px;
    border-radius:14px;
    overflow:hidden;
    background:#000;
    display:none;
  }
  #qr-video{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
  }
  .qr-frame{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:72%;
    aspect-ratio:1/1;
    max-width:230px;
    pointer-events:none;
  }
  .qr-frame::before{
    content:'';
    position:absolute;inset:0;
    box-shadow:0 0 0 2000px rgba(0,0,0,0.45);
    border-radius:14px;
  }
  .qr-corner{
    position:absolute;
    width:32px;height:32px;
    border:3px solid var(--accent);
  }
  .qr-corner.tl{top:-2px;left:-2px;border-right:none;border-bottom:none;border-radius:10px 0 0 0;}
  .qr-corner.tr{top:-2px;right:-2px;border-left:none;border-bottom:none;border-radius:0 10px 0 0;}
  .qr-corner.bl{bottom:-2px;left:-2px;border-right:none;border-top:none;border-radius:0 0 0 10px;}
  .qr-corner.br{bottom:-2px;right:-2px;border-left:none;border-top:none;border-radius:0 0 10px 0;}
  .qr-scan-line{
    position:absolute;
    left:6%;right:6%;
    height:2px;
    background:var(--accent);
    box-shadow:0 0 8px var(--accent);
    animation:qrscan 2.2s ease-in-out infinite;
  }
  @keyframes qrscan{
    0%{top:8%;}
    50%{top:88%;}
    100%{top:8%;}
  }
  .qr-scan-hint{
    position:absolute;
    bottom:14px;left:0;right:0;
    text-align:center;
    color:#fff;
    font-size:12px;
    font-family:var(--mono);
    letter-spacing:0.5px;
    text-shadow:0 1px 3px rgba(0,0,0,0.6);
  }

  .movement-row{
    display:flex;align-items:center;gap:12px;
    padding:11px 0;
    border-bottom:1px solid var(--border);
  }
  .movement-row .m-icon{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:600;font-size:14px;
    flex-shrink:0;
  }
  .m-icon.in{background:rgba(95,167,119,0.15);color:var(--success);}
  .m-icon.out{background:rgba(214,69,69,0.15);color:var(--danger);}
  .movement-row .m-info{flex:1;min-width:0;}
  .movement-row .m-name{font-size:13.5px;font-weight:600;}
  .movement-row .m-meta{font-family:var(--mono);font-size:10.5px;color:var(--text-muted);margin-top:1px;}
  .movement-row .m-qty{font-family:var(--mono);font-weight:600;font-size:14px;}
  .m-qty.in{color:var(--success);}
  .m-qty.out{color:var(--danger);}
  .movement-row .m-tags{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;}
  .m-chip{
    font-size:10px;
    font-family:var(--mono);
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text-muted);
    padding:1px 6px;
    border-radius:3px;
  }

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--text-muted);
  }
  .empty-state .disp{font-family:var(--disp);font-size:15px;color:var(--text);margin-bottom:6px;}
  .toast{
    position:fixed;
    bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 18px;
    border-radius:8px;
    font-size:13px;
    z-index:100;
    box-shadow:0 4px 14px rgba(31,41,51,0.15);
    max-width:90%;
    text-align:center;
  }
  ::-webkit-scrollbar{width:0;height:0;}

  .print-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:14px;
  }
  .print-tile{
    background:#fff;
    border:1px dashed var(--border);
    border-radius:6px;
    padding:10px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
  }
  .print-tile .ptid{
    font-family:var(--mono);font-size:11px;color:#1b1d1f;letter-spacing:0.5px;
  }
  .print-tile .qr-holder canvas, .print-tile .qr-holder img{
    width:84px;height:84px;
  }
  @media print{
    @page{ margin:12mm; }
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{
      position:absolute;top:0;left:0;width:100%;
      display:grid;grid-template-columns:1fr 1fr;gap:16mm;
      padding:0;
    }
    .print-tile{
      border:1px solid #999;
      background:#fff !important;
      padding:8mm;
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
      page-break-inside:avoid;
    }
    .print-tile .ptid{color:#000;font-size:13px;}
    .print-tile canvas, .print-tile img{
      width:45mm !important;height:45mm !important;
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
    }
  }

  .login-screen{
    min-height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:24px;
  }
  .login-screen .brand-lg{
    font-family:var(--disp);font-size:28px;font-weight:700;margin-bottom:28px;
  }
  .login-screen .brand-lg span{color:var(--accent);}
  .login-box{
    width:100%;max-width:340px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:22px 20px;
  }
  .login-box .err{
    color:var(--danger);font-size:12.5px;margin-top:10px;min-height:16px;
  }
  .logout-link{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--text-muted);
    background:none;border:none;cursor:pointer;
    text-decoration:underline;
    padding:0;margin-top:2px;
  }
  .role-badge{
    font-family:var(--mono);font-size:10px;
    color:var(--accent);
    border:1px solid var(--accent-dim);
    padding:1px 6px;border-radius:3px;
    margin-left:6px;
  }
</style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="brand-lg">MAT<span>.</span>LAGER</div>
  <div class="login-box">
    <label>Benutzername</label>
    <input type="text" id="loginEmail" placeholder="z. B. max" autocomplete="username">
    <label>Passwort</label>
    <input type="text" id="loginPassword" placeholder="Passwort" autocomplete="current-password" style="-webkit-text-security:disc;">
    <div class="btn-row">
      <button class="btn btn-primary btn-block" id="loginBtn">Anmelden</button>
    </div>
    <div class="err" id="loginErr"></div>
  </div>
</div>
<div id="app" style="display:none;">
  <div class="hazard-strip"></div>
  <header>
    <div class="brand">
      <h1>MAT<span>.</span>LAGER</h1>
      <div class="count" id="itemCount"><span class="conn-dot" id="connDot"></span>0 Artikel</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
      <div style="font-size:11px;color:var(--text-muted);" id="userLine"></div>
      <button class="logout-link" id="logoutBtn">Abmelden</button>
    </div>
  </header>
  <main id="main"></main>
  <div class="fab" id="fab" style="display:none;">
    <button id="fabAdd">+</button>
  </div>
  <nav class="tabs">
    <button data-tab="dashboard" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Übersicht
    </button>
    <button data-tab="scan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a5 5 0 0 1 5 5v1a5 5 0 0 1-2 4"/><path d="M12 22a5 5 0 0 1-5-5v-1a5 5 0 0 1 2-4"/><circle cx="12" cy="12" r="2"/></svg>
      Scan
    </button>
    <button data-tab="articles">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7 12 3 4 7v10l8 4 8-4V7z"/><path d="M4 7l8 4 8-4"/><path d="M12 11v10"/></svg>
      Artikel
    </button>
    <button data-tab="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 7v5l3 3"/></svg>
      Verlauf
    </button>
    <button data-tab="wishlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Bestellliste
    </button>
    <button data-tab="admin" id="navAdmin" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Verwaltung
    </button>
  </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, setDoc, addDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ---- Firebase-Konfiguration ----
const firebaseConfig = {
  apiKey: "AIzaSyD6zaLeNU1ZY-JHFYr-JrbpEUz096m9bfo",
  authDomain: "mat-lager.firebaseapp.com",
  projectId: "mat-lager",
  storageBucket: "mat-lager.firebasestorage.app",
  messagingSenderId: "838703283009",
  appId: "1:838703283009:web:97f4a2e59a3ab44c67bfc0"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

// Zweite, unabhängige Firebase-Instanz: Damit lassen sich neue Nutzerkonten
// anlegen, ohne dass die eigene (Admin-)Sitzung dabei überschrieben wird.
const fbAppSecondary = initializeApp(firebaseConfig, 'Secondary');
const authSecondary = getAuth(fbAppSecondary);

let articles = [];
let movements = [];
let profiles = [];
let rolesList = [];
let wishlist = [];
let notifSettings = null;
let currentTab = 'dashboard';
let qrScanStream = null;
let connected = false;
let unsubArticles = null;
let unsubMovements = null;
let unsubProfiles = null;
let unsubRoles = null;
let unsubWishlist = null;
let unsubSettings = null;
let isAdmin = false;
let currentUserEmail = '';
let currentUid = '';

const $ = sel => document.querySelector(sel);
const main = $('#main');

function setConn(ok){
  connected = ok;
  const dot = $('#connDot');
  if(dot){ dot.className = 'conn-dot ' + (ok ? 'ok' : 'err'); }
}

// Interne Pseudo-Domain, damit Firebase Auth (das intern ein E-Mail-Format
// erwartet) mit einfachen Benutzernamen statt echten E-Mail-Adressen läuft.
const AUTH_DOMAIN_SUFFIX = '@matlager.local';
function usernameToAuthEmail(username){
  return username.trim().toLowerCase().replace(/\s+/g,'') + AUTH_DOMAIN_SUFFIX;
}
function authEmailToUsername(email){
  return (email||'').replace(AUTH_DOMAIN_SUFFIX, '');
}

// ---- Login ----
$('#loginBtn').addEventListener('click', doLogin);
$('#loginPassword').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
async function doLogin(){
  const username = $('#loginEmail').value.trim();
  const pass = $('#loginPassword').value;
  const errEl = $('#loginErr');
  errEl.textContent = '';
  if(!username || !pass){ errEl.textContent = 'Bitte Benutzername und Passwort eingeben.'; return; }
  const btn = $('#loginBtn');
  btn.disabled = true; btn.textContent = 'Anmelden…';
  try{
    await signInWithEmailAndPassword(auth, usernameToAuthEmail(username), pass);
  }catch(e){
    errEl.textContent = 'Anmeldung fehlgeschlagen. Benutzername oder Passwort prüfen.';
  }finally{
    btn.disabled = false; btn.textContent = 'Anmelden';
  }
}
$('#logoutBtn').addEventListener('click', async ()=>{
  if(unsubArticles) unsubArticles();
  if(unsubMovements) unsubMovements();
  await signOut(auth);
});

// ---- Auth-Status & Rolle laden ----
onAuthStateChanged(auth, async user => {
  if(user){
    currentUserEmail = user.email || '';
    currentUid = user.uid;
    const displayName = authEmailToUsername(currentUserEmail);

    // Zuerst prüfen, ob dieses Konto gesperrt wurde – falls ja, sofort abmelden,
    // bevor irgendwelche Daten geladen oder die App angezeigt wird.
    try{
      const profSnap = await getDoc(doc(db, 'profiles', user.uid));
      if(profSnap.exists() && profSnap.data().blocked){
        await signOut(auth);
        $('#loginErr').textContent = 'Dieses Konto wurde gesperrt. Bitte an den Admin wenden.';
        return;
      }
    }catch(e){ console.error('Sperr-Status konnte nicht geprüft werden', e); }

    let role = 'user';
    try{
      const roleSnap = await getDoc(doc(db, 'roles', user.uid));
      if(roleSnap.exists() && roleSnap.data().role === 'admin') role = 'admin';
    }catch(e){ console.error('Rolle konnte nicht geladen werden', e); }
    isAdmin = (role === 'admin');
    $('#userLine').innerHTML = escapeHtml(displayName) + (isAdmin ? '<span class="role-badge">Admin</span>' : '<span class="role-badge">Mitarbeiter</span>');
    $('#navAdmin').style.display = isAdmin ? 'flex' : 'none';
    $('#loginScreen').style.display = 'none';
    $('#app').style.display = 'flex';
    $('#loginEmail').value = ''; $('#loginPassword').value = ''; $('#loginErr').textContent = '';
    // Eigenes Profil aktualisieren (Benutzername + letzter Login), damit
    // Admins in der Verwaltung sehen, wer sich schon mal angemeldet hat.
    // "blocked" wird hier bewusst nicht mitgeschrieben, damit ein bestehendes
    // Sperr-Flag durch den Login-Vorgang nicht versehentlich überschrieben wird.
    try{
      await setDoc(doc(db, 'profiles', user.uid), { username: displayName, lastLogin: Date.now() }, { merge: true });
    }catch(e){ console.error('Profil konnte nicht aktualisiert werden', e); }
    startListeners();
  } else {
    isAdmin = false;
    currentUid = '';
    $('#navAdmin').style.display = 'none';
    $('#loginScreen').style.display = 'flex';
    $('#app').style.display = 'none';
    if(unsubArticles) unsubArticles();
    if(unsubMovements) unsubMovements();
    if(unsubProfiles) unsubProfiles();
    if(unsubRoles) unsubRoles();
    if(unsubSettings) unsubSettings();
    if(unsubWishlist) unsubWishlist();
  }
});

// ---- Echtzeit-Listener (erst nach Login gestartet) ----
function startListeners(){
  unsubArticles = onSnapshot(collection(db, 'articles'), snap => {
    articles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    setConn(true);
    render();
  }, err => { setConn(false); toast('Verbindung zur Datenbank fehlgeschlagen'); console.error(err); });

  unsubMovements = onSnapshot(query(collection(db, 'movements'), orderBy('timestamp', 'desc')), snap => {
    movements = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, err => { console.error(err); });

  unsubProfiles = onSnapshot(collection(db, 'profiles'), snap => {
    profiles = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    if(currentTab==='admin') render();
  }, err => { console.error(err); });

  unsubRoles = onSnapshot(collection(db, 'roles'), snap => {
    rolesList = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    if(currentTab==='admin') render();
  }, err => { console.error(err); });

  unsubSettings = onSnapshot(doc(db, 'settings', 'notifications'), snap => {
    notifSettings = snap.exists() ? snap.data() : null;
    if(currentTab==='admin') render();
  }, err => { console.error(err); });

  unsubWishlist = onSnapshot(query(collection(db, 'requests'), orderBy('createdAt', 'desc')), snap => {
    wishlist = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if(currentTab==='wishlist') render();
  }, err => { console.error(err); });
}

function uid(prefix){
  return prefix + '-' + Math.random().toString(36).slice(2,7).toUpperCase();
}
function genArticleId(category){
  const pre = (category||'MAT').slice(0,3).toUpperCase();
  const existing = articles.filter(a=>a.id.startsWith(pre+'-'));
  const n = existing.length + 1;
  return pre + '-' + String(n).padStart(3,'0');
}
function fmtDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('de-CH',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
}
function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}
function isLow(a){ return a.stock < a.minStock; }
function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML;
}

function render(){
  $('#itemCount').innerHTML = `<span class="conn-dot ${connected?'ok':'err'}" id="connDot"></span>${articles.length} Artikel`;
  $('#fab').style.display = ((currentTab === 'articles' && isAdmin) || currentTab === 'wishlist') ? 'flex' : 'none';
  if(currentTab==='dashboard') renderDashboard();
  if(currentTab==='articles') renderArticles();
  if(currentTab==='scan') renderScan();
  if(currentTab==='history') renderHistory();
  if(currentTab==='wishlist') renderWishlist();
  if(currentTab==='admin') renderAdmin();
}

function renderDashboard(){
  const low = articles.filter(isLow);
  const today = new Date().toDateString();
  const todayMoves = movements.filter(m => new Date(m.timestamp).toDateString()===today).length;
  let html = `
    <div class="stat-row">
      <div class="stat-card"><div class="num">${articles.length}</div><div class="label">Artikel gesamt</div></div>
      <div class="stat-card ${low.length? 'warn':''}"><div class="num">${low.length}</div><div class="label">Unter Mindestbestand</div></div>
      <div class="stat-card"><div class="num">${todayMoves}</div><div class="label">Bewegungen heute</div></div>
    </div>
  `;
  if(low.length){
    html += `<h2 class="section-title">Nachbestellen</h2>`;
    low.forEach(a => html += tagCardHtml(a));
  } else {
    html += `<div class="empty-state"><div class="disp">Alles im grünen Bereich</div>Kein Artikel unter Mindestbestand.</div>`;
  }
  main.innerHTML = html;
  bindTagCards();
}

function tagCardHtml(a){
  return `
  <div class="tag-card ${isLow(a)?'low':''}" data-id="${a.id}">
    <div class="info">
      <div class="name">${escapeHtml(a.name)}</div>
      <div class="meta">${a.id} · ${escapeHtml(a.location||'—')}</div>
    </div>
    <div class="stock">${a.stock}<small>Min. ${a.minStock}</small></div>
  </div>`;
}
function bindTagCards(){
  document.querySelectorAll('.tag-card').forEach(el=>{
    el.addEventListener('click', ()=> openArticleDetail(el.dataset.id));
  });
}

function renderArticles(){
  const categories = [...new Set(articles.map(a => a.category || 'Sonstiges'))].sort();
  let html = `<input class="search-bar" id="searchInput" type="text" placeholder="Artikel suchen…">`;
  if(categories.length > 1){
    html += `<div class="filter-row" id="catFilterRow">
      <button class="chip-filter active" data-cat="__all">Alle</button>
      ${categories.map(c => `<button class="chip-filter" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('')}
    </div>`;
  }
  html += `<div id="articleList"></div>`;
  main.innerHTML = html;
  let activeCat = '__all';
  const list = () => {
    const q = ($('#searchInput').value||'').toLowerCase();
    const filtered = articles.filter(a => {
      const matchesQuery = a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q);
      const matchesCat = activeCat === '__all' || (a.category || 'Sonstiges') === activeCat;
      return matchesQuery && matchesCat;
    });
    $('#articleList').innerHTML = filtered.length
      ? filtered.map(tagCardHtml).join('')
      : `<div class="empty-state"><div class="disp">Keine Treffer</div>Versuch eine andere Suche oder Kategorie.</div>`;
    bindTagCards();
  };
  $('#searchInput').addEventListener('input', list);
  if(categories.length > 1){
    $('#catFilterRow').querySelectorAll('.chip-filter').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        $('#catFilterRow').querySelectorAll('.chip-filter').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        list();
      });
    });
  }
  list();
  $('#fabAdd').onclick = openAddArticleSheet;
}

function renderHistory(){
  if(!movements.length){
    main.innerHTML = `<div class="empty-state"><div class="disp">Noch keine Bewegungen</div>Buchungen erscheinen hier chronologisch.</div>`;
    return;
  }
  main.innerHTML = `<input class="search-bar" id="historySearch" type="text" placeholder="Suche nach Person, Kommission oder Artikel…"><div id="historyList"></div>`;
  const list = () => {
    const q = ($('#historySearch').value||'').toLowerCase();
    const filtered = movements.filter(m=>{
      if(!q) return true;
      const a = articles.find(x=>x.id===m.articleId);
      return (m.person||'').toLowerCase().includes(q)
        || (m.komm||'').toLowerCase().includes(q)
        || (a && a.name.toLowerCase().includes(q))
        || m.articleId.toLowerCase().includes(q);
    });
    let html = '<div>';
    if(!filtered.length){
      html = `<div class="empty-state"><div class="disp">Keine Treffer</div>Versuch einen anderen Suchbegriff.</div>`;
    } else {
      filtered.forEach(m=>{
        const a = articles.find(x=>x.id===m.articleId);
        html += `
        <div class="movement-row">
          <div class="m-icon ${m.type}">${m.type==='in'?'↓':'↑'}</div>
          <div class="m-info">
            <div class="m-name">${escapeHtml(a?a.name:'Gelöschter Artikel')}</div>
            <div class="m-meta">${fmtDate(m.timestamp)} · ${m.articleId}</div>
            <div class="m-tags">
              ${m.person ? `<span class="m-chip">${escapeHtml(m.person)}</span>` : ''}
              ${m.komm ? `<span class="m-chip">Komm. ${escapeHtml(m.komm)}</span>` : ''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            <div class="m-qty ${m.type}">${m.type==='in'?'+':'−'}${m.qty}</div>
            ${isAdmin ? `<button class="btn btn-secondary" data-delmove="${m.id}" style="padding:2px 8px;font-size:10px;color:var(--danger);">Löschen</button>` : ''}
          </div>
        </div>`;
      });
      html += '</div>';
    }
    $('#historyList').innerHTML = html;
    main.querySelectorAll('[data-delmove]').forEach(btn=>{
      btn.onclick = async ()=>{
        try{
          await deleteDoc(doc(db, 'movements', btn.dataset.delmove));
          toast('Eintrag gelöscht');
        }catch(e){
          toast('Löschen fehlgeschlagen');
          console.error(e);
        }
      };
    });
  };
  $('#historySearch').addEventListener('input', list);
  list();
}

function renderWishlist(){
  const open = wishlist.filter(w => !w.done);
  const done = wishlist.filter(w => w.done);

  const rowHtml = (w) => {
    const canDelete = isAdmin || w.requestedByUid === currentUid;
    return `
    <div class="movement-row">
      <div class="m-icon ${w.done ? 'in' : 'out'}">${w.done ? '✓' : '!'}</div>
      <div class="m-info">
        <div class="m-name">${escapeHtml(w.text)}${w.qty ? ' <span class="role-badge" style="border-color:var(--border);color:var(--text-muted);">' + escapeHtml(String(w.qty)) + '</span>' : ''}</div>
        <div class="m-meta">${escapeHtml(w.requestedBy || '—')} · ${fmtDate(w.createdAt)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        ${(isAdmin && !w.done) ? `<button class="btn btn-secondary" data-done="${w.id}" style="padding:4px 10px;font-size:10.5px;">Erledigt</button>` : ''}
        ${canDelete ? `<button class="btn btn-secondary" data-delwish="${w.id}" style="padding:4px 10px;font-size:10.5px;color:var(--danger);">Löschen</button>` : ''}
      </div>
    </div>`;
  };

  let html = `<h2 class="section-title">Offene Bestellungen (${open.length})</h2>`;
  html += open.length ? open.map(rowHtml).join('') : `<div class="empty-state" style="padding:24px 10px;"><div class="disp">Keine offenen Eintr\u00e4ge</div>\u00dcber den + Button kannst du etwas hinzuf\u00fcgen, das im Lager fehlt.</div>`;

  if(done.length){
    html += `<h2 class="section-title" style="margin-top:22px;">Erledigt (${done.length})</h2>`;
    html += done.map(rowHtml).join('');
  }

  main.innerHTML = html;

  main.querySelectorAll('[data-done]').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        await updateDoc(doc(db, 'requests', btn.dataset.done), { done: true, doneAt: Date.now() });
      }catch(e){ toast('Fehlgeschlagen'); console.error(e); }
    };
  });
  main.querySelectorAll('[data-delwish]').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        await deleteDoc(doc(db, 'requests', btn.dataset.delwish));
        toast('Eintrag gelöscht');
      }catch(e){ toast('Löschen fehlgeschlagen'); console.error(e); }
    };
  });

  $('#fabAdd').onclick = openAddWishSheet;
}

function openAddWishSheet(){
  const sheet = buildSheet(`
    <div class="sheet-head"><h3>Neue Bestellung</h3><button class="x" data-close>×</button></div>
    <div style="font-size:12.5px;color:var(--text-muted);margin-bottom:6px;">
      Für Material oder Artikel, die im Lager fehlen oder neu beschafft werden sollen.
    </div>
    <label>Was wird benötigt?</label>
    <input type="text" id="w-text" placeholder="z. B. Schrauben M10x60">
    <label>Menge <span style="text-transform:none;letter-spacing:0;">(optional)</span></label>
    <input type="text" id="w-qty" placeholder="z. B. 50 Stück">
    <div class="btn-row">
      <button class="btn btn-secondary btn-block" data-close>Abbrechen</button>
      <button class="btn btn-primary btn-block" id="w-save">Hinzufügen</button>
    </div>
  `);
  sheet.querySelector('#w-save').onclick = async ()=>{
    const btn = sheet.querySelector('#w-save');
    const text = sheet.querySelector('#w-text').value.trim();
    if(!text){ toast('Bitte eintragen, was benötigt wird'); return; }
    const qty = sheet.querySelector('#w-qty').value.trim();
    btn.disabled = true; btn.textContent = 'Speichere…';
    try{
      await addDoc(collection(db, 'requests'), {
        text, qty,
        requestedBy: authEmailToUsername(currentUserEmail),
        requestedByUid: currentUid,
        createdAt: Date.now(),
        done: false
      });
      closeSheet();
      toast('Bestellung hinzugefügt');
    }catch(e){
      toast('Speichern fehlgeschlagen: ' + (e.code || e.message || 'unbekannter Fehler'));
      console.error(e);
      btn.disabled = false; btn.textContent = 'Hinzufügen';
    }
  };
}

function renderAdmin(){
  if(!isAdmin){ main.innerHTML = `<div class="empty-state"><div class="disp">Kein Zugriff</div>Dieser Bereich ist nur für Admins.</div>`; return; }

  const roleByUid = {};
  rolesList.forEach(r => roleByUid[r.uid] = r.role);

  const userRows = profiles.length ? profiles.map(p => {
    const role = roleByUid[p.uid] || 'user';
    const last = p.lastLogin ? fmtDate(p.lastLogin) : '—';
    const isBlocked = !!p.blocked;
    const isSelf = p.uid === currentUid;
    let actionBtn = '';
    if(!isSelf){
      actionBtn = isBlocked
        ? `<button class="btn btn-secondary" data-unblock="${p.uid}" style="padding:4px 10px;font-size:10.5px;margin-top:4px;">Freischalten</button>`
        : `<button class="btn btn-secondary" data-remove="${p.uid}" style="padding:4px 10px;font-size:10.5px;margin-top:4px;color:var(--danger);">Entfernen</button>`;
    }
    return `
    <div class="movement-row">
      <div class="m-icon ${role==='admin'?'in':'out'}">${role==='admin'?'A':'M'}</div>
      <div class="m-info">
        <div class="m-name">${escapeHtml(p.username||p.uid)}${isBlocked ? ' <span class="role-badge" style="border-color:var(--danger);color:var(--danger);">Gesperrt</span>' : ''}</div>
        <div class="m-meta">Letzter Login: ${last}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;">
        <span class="role-badge" style="margin-left:0;">${role==='admin'?'Admin':'Mitarbeiter'}</span>
        ${actionBtn}
      </div>
    </div>`;
  }).join('') : `<div style="font-size:12.5px;color:var(--text-muted);padding:10px 0;">Noch keine Nutzer haben sich angemeldet. Neu angelegte Nutzer erscheinen hier, sobald sie sich das erste Mal einloggen.</div>`;

  main.innerHTML = `
    <h2 class="section-title">Nutzer (${profiles.length})</h2>
    ${userRows}

    <h2 class="section-title" style="margin-top:22px;">Neuen Nutzer anlegen</h2>
    <label>Benutzername</label>
    <input type="text" id="nu-username" placeholder="z. B. anna">
    <label>Passwort</label>
    <input type="text" id="nu-password" placeholder="Passwort (mind. 6 Zeichen)">
    <label>Rolle</label>
    <select id="nu-role">
      <option value="user">Mitarbeiter</option>
      <option value="admin">Admin</option>
    </select>
    <div class="btn-row">
      <button class="btn btn-primary btn-block" id="nu-create">Nutzer anlegen</button>
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">Der Nutzer taucht oben erst nach dem ersten Login auf, ist aber ab sofort anmeldefähig.</div>

    <h2 class="section-title" style="margin-top:26px;">Benachrichtigung bei Mindestbestand</h2>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">
      Verschickt eine E-Mail an dich, sobald eine Entnahme den Bestand eines Artikels unter den Mindestbestand drückt. Benötigt ein kostenloses <a href="https://www.emailjs.com" target="_blank" style="color:var(--accent);">EmailJS</a>-Konto.
    </div>
    <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:13px;color:var(--text);">

async function startNfcScan(){
  if(!('NDEFReader' in window)){
    toast('Web NFC wird auf diesem Gerät nicht unterstützt');
    return;
  }
  try{
    const reader = new NDEFReader();
    await reader.scan();
    $('#scanCaption').textContent = 'Scanne… Tag antippen';
    $('#scanCaption').classList.add('active');
    reader.onreading = event => {
      let text = '';
      for(const record of event.message.records){
        if(record.recordType === 'text'){
          const decoder = new TextDecoder(record.encoding || 'utf-8');
          text = decoder.decode(record.data);
        }
      }
      if(!text) text = event.serialNumber;
      if(text) lookupAndOpen(text.trim());
    };
    reader.onreadingerror = () => toast('Tag konnte nicht gelesen werden');
  }catch(e){
    toast('NFC-Zugriff verweigert oder fehlgeschlagen');
  }
}

async function startQrScan(){
  if(typeof jsQR !== 'function'){
    toast('QR-Scan-Bibliothek konnte nicht geladen werden. Internetverbindung prüfen und Seite neu laden.');
    return;
  }
  const video = $('#qr-video');
  const wrap = $('#qr-scan-wrap');
  wrap.style.display = 'block';
  try{
    qrScanStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width: { ideal: 640 },
        height: { ideal: 480 }
      }
    });
    video.srcObject = qrScanStream;
    await video.play();
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    let errorShown = false;
    const tick = () => {
      if(!qrScanStream) return;
      try{
        if(video.readyState === video.HAVE_ENOUGH_DATA){
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
          const code = jsQR(imgData.data, imgData.width, imgData.height);
          if(code && code.data){
            stopQrScan();
            lookupAndOpen(code.data.trim());
            return;
          }
        }
      }catch(e){
        console.error('QR-Scan-Fehler', e);
        if(!errorShown){ errorShown = true; toast('Scan-Fehler: ' + e.message); }
      }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }catch(e){
    toast('Kamerazugriff nicht möglich');
    wrap.style.display = 'none';
  }
}
function stopQrScan(){
  if(qrScanStream){
    qrScanStream.getTracks().forEach(t=>t.stop());
    qrScanStream = null;
  }
  const wrap = $('#qr-scan-wrap');
  if(wrap) wrap.style.display = 'none';
}

    try{
      const writer = new NDEFReader();
      await writer.write({ records: [{ recordType: 'text', data: a.id }] });
      toast('Tag erfolgreich beschrieben: ' + a.id);
    }catch(e){
      toast('Schreiben fehlgeschlagen oder abgebrochen');
    }
  };

  try{
    new QRCode(sheet.querySelector('#qrHolder'), { text: a.id, width: 96, height: 96, colorDark:'#1b1d1f', colorLight:'#ffffff' });
  }catch(e){
    sheet.querySelector('#qrHolder').innerHTML = `<div style="width:96px;height:96px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;text-align:center;padding:4px;">QR nicht verfügbar</div>`;
  }

  const lastPerson = localStorage.getItem('mat-lager-last-person') || authEmailToUsername(currentUserEmail);
  if(lastPerson) sheet.querySelector('#f-person').value = lastPerson;
}

function openEditArticleSheet(id){
  if(!isAdmin){ toast('Nur Admins können Artikel bearbeiten'); return; }
  const a = articles.find(x=>x.id===id);
  if(!a) return;
  const sheet = buildSheet(`
    <div class="sheet-head"><h3>Artikel bearbeiten</h3><button class="x" data-close>×</button></div>
    <div class="stencil-id">TAG · ${a.id} (ID bleibt unverändert)</div>
    <label>Name</label>
    <input type="text" id="f-name" value="${escapeHtml(a.name)}">
    <label>Kategorie</label>
    ${categorySelectHtml(a.category||'')}
    <label>Art. Nr. Händler <span style="text-transform:none;letter-spacing:0;">(optional)</span></label>
    <input type="text" id="f-vendor" value="${escapeHtml(a.vendorArticleNumber||'')}" placeholder="z. B. 123456-A">
    <label>Standort</label>
    <input type="text" id="f-loc" value="${escapeHtml(a.location||'')}">
    <label>Bestand</label>
    <input type="number" id="f-stock" value="${a.stock}" min="0">
    <label>Mindestbestand</label>
    <input type="number" id="f-min" value="${a.minStock}" min="0">
    <div style="font-size:11.5px;color:var(--text-muted);margin-top:10px;">
      Hinweis: Eine manuelle Bestandsänderung hier wird nicht als Ein-/Auslagerung im Verlauf protokolliert.
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary btn-block" data-close>Abbrechen</button>
      <button class="btn btn-primary btn-block" id="saveEdit">Speichern</button>
    </div>
  `);
  bindCategorySelect(sheet);
  sheet.querySelector('#saveEdit').onclick = async ()=>{
    const btn = sheet.querySelector('#saveEdit');
    const name = sheet.querySelector('#f-name').value.trim();
    if(!name){ toast('Bitte einen Namen eingeben'); return; }
    btn.disabled = true; btn.textContent = 'Speichere…';
    try{
      await updateDoc(doc(db, 'articles', a.id), {
        name,
        category: getCategoryValue(sheet) || 'Sonstiges',
        vendorArticleNumber: sheet.querySelector('#f-vendor').value.trim(),
        location: sheet.querySelector('#f-loc').value.trim(),
        stock: parseInt(sheet.querySelector('#f-stock').value)||0,
        minStock: parseInt(sheet.querySelector('#f-min').value)||0
      });
      closeSheet();
      toast('Artikel aktualisiert');
    }catch(e){
      toast('Speichern fehlgeschlagen');
      btn.disabled = false; btn.textContent = 'Speichern';
      console.error(e);
    }
  };
}

async function book(articleId, type, qty, person, komm){
  const a = articles.find(x=>x.id===articleId);
  const oldStock = a ? a.stock : null;
  try{
    await updateDoc(doc(db, 'articles', articleId), {
      stock: increment(type==='in' ? qty : -qty)
    });
    await addDoc(collection(db, 'movements'), {
      articleId, type, qty, person: person||'', komm: komm||'', timestamp: Date.now()
    });
    if(person) localStorage.setItem('mat-lager-last-person', person);
    closeSheet();
    toast((type==='in' ? 'Eingelagert: ' : 'Entnommen: ') + qty + 'x' + (person ? ' · ' + person : ''));
    // Bei Entnahme prüfen, ob der Bestand gerade neu unter den Mindestbestand fällt
    // (nur beim Überschreiten der Schwelle, nicht bei jeder weiteren Entnahme darunter).
    if(type==='out' && a && oldStock !== null){
      const newStock = oldStock - qty;
      if(oldStock >= a.minStock && newStock < a.minStock){
        sendLowStockEmail(a, newStock);
      }
    }
  }catch(e){
    toast('Buchung fehlgeschlagen – Verbindung prüfen');
    console.error(e);
  }
}

function buildSheet(innerHtml){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `<div class="sheet">${innerHtml}</div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeSheet(); });
  overlay.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click', closeSheet));
  return overlay;
}
function closeSheet(){
  stopQrScan();
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
}

document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    stopQrScan();
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  });
});

render();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
