<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MAT.LAGER</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b1d1f">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<style>
  :root{
    --bg:#1b1d1f;
    --panel:#232628;
    --panel-alt:#2b2e31;
    --accent:#e8871e;
    --accent-dim:#8a5420;
    --blue:#4c7a9e;
    --danger:#d64545;
    --success:#5fa777;
    --text:#edeae3;
    --text-muted:#8d9094;
    --border:#3a3d40;
    --disp:'Space Grotesk',sans-serif;
    --mono:'IBM Plex Mono',monospace;
    --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--bg);
    position:relative;
  }
  .hazard-strip{
    height:6px;
    width:100%;
    background:repeating-linear-gradient(135deg, var(--accent) 0 10px, #1b1d1f 10px 20px);
    flex-shrink:0;
  }
  header{
    padding:18px 20px 14px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .brand{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  .brand h1{
    font-family:var(--disp);
    font-size:22px;
    font-weight:700;
    letter-spacing:0.5px;
    margin:0;
  }
  .brand h1 span{color:var(--accent);}
  .brand .count{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-muted);
    border:1px solid var(--border);
    padding:3px 8px;
    border-radius:3px;
  }
  .conn-dot{
    display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--text-muted);margin-right:5px;
  }
  .conn-dot.ok{background:var(--success);}
  .conn-dot.err{background:var(--danger);}
  main{
    flex:1;
    overflow-y:auto;
    padding:16px 16px 90px;
  }
  nav.tabs{
    position:sticky;
    bottom:0;
    display:flex;
    background:var(--panel);
    border-top:1px solid var(--border);
    flex-shrink:0;
  }
  nav.tabs button{
    flex:1;
    background:none;
    border:none;
    color:var(--text-muted);
    font-family:var(--body);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.3px;
    padding:10px 4px 12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    cursor:pointer;
  }
  nav.tabs button.active{color:var(--accent);}
  nav.tabs svg{width:20px;height:20px;}

  .stat-row{display:flex;gap:10px;margin-bottom:18px;}
  .stat-card{
    flex:1;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 14px;
  }
  .stat-card .num{font-family:var(--disp);font-size:26px;font-weight:700;}
  .stat-card.warn .num{color:var(--danger);}
  .stat-card .label{font-size:11px;color:var(--text-muted);margin-top:2px;}

  h2.section-title{
    font-family:var(--disp);
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--text-muted);
    margin:0 0 10px;
  }

  .tag-card{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:2px;
    margin-bottom:10px;
    padding:12px 14px 12px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    clip-path:polygon(0 10px, 10px 0, 100% 0, 100% 100%, 0 100%);
  }
  .tag-card::before{
    content:'';
    position:absolute;
    left:6px;top:6px;
    width:4px;height:4px;
    border-radius:50%;
    background:var(--border);
  }
  .tag-card.low{border-left:3px solid var(--danger);}
  .tag-card .info{flex:1;min-width:0;}
  .tag-card .name{font-weight:600;font-size:14.5px;margin-bottom:3px;}
  .tag-card .meta{font-family:var(--mono);font-size:11px;color:var(--text-muted);}
  .tag-card .stock{
    font-family:var(--mono);
    font-size:18px;
    font-weight:600;
    text-align:right;
  }
  .tag-card .stock small{display:block;font-size:9px;color:var(--text-muted);font-weight:400;}
  .tag-card.low .stock{color:var(--danger);}

  .filter-row{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding-bottom:4px;
    margin-bottom:14px;
  }
  .filter-row::-webkit-scrollbar{display:none;}
  .chip-filter{
    flex-shrink:0;
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text-muted);
    font-family:var(--body);
    font-size:12.5px;
    font-weight:600;
    padding:7px 13px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
  }
  .chip-filter.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#1b1d1f;
  }
  .search-bar{
    width:100%;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:6px;
    font-family:var(--body);
    font-size:14px;
    margin-bottom:14px;
  }
  .search-bar::placeholder{color:var(--text-muted);}

  .fab{
    position:fixed;
    max-width:480px;
    margin:0 auto;
    left:0;right:0;
    bottom:78px;
    display:flex;
    justify-content:flex-end;
    pointer-events:none;
    padding:0 16px;
  }
  .fab button{
    pointer-events:all;
    background:var(--accent);
    color:#1b1d1f;
    border:none;
    width:52px;height:52px;
    border-radius:50%;
    font-size:26px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
  }

  .btn{
    font-family:var(--body);
    font-weight:600;
    font-size:14px;
    border:none;
    border-radius:6px;
    padding:11px 16px;
    cursor:pointer;
  }
  .btn-primary{background:var(--accent);color:#1b1d1f;}
  .btn-secondary{background:var(--panel-alt);color:var(--text);border:1px solid var(--border);}
  .btn-success{background:var(--success);color:#10251a;}
  .btn-danger{background:var(--danger);color:#2a0d0d;}
  .btn-block{width:100%;}
  .btn-row{display:flex;gap:8px;margin-top:14px;}
  .btn[disabled]{opacity:0.5;cursor:not-allowed;}

  label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--text-muted);
    margin:12px 0 5px;
  }
  input[type=text], input[type=number], select{
    width:100%;
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:6px;
    font-family:var(--body);
    font-size:14px;
  }

  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;align-items:flex-end;
    z-index:50;
  }
  .sheet{
    background:var(--panel);
    width:100%;
    max-width:480px;
    margin:0 auto;
    border-radius:16px 16px 0 0;
    padding:18px 20px 26px;
    max-height:88vh;
    overflow-y:auto;
    border-top:1px solid var(--border);
  }
  .sheet-head{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:4px;
  }
  .sheet-head h3{font-family:var(--disp);font-size:18px;margin:0;}
  .sheet-head .x{color:var(--text-muted);font-size:22px;cursor:pointer;background:none;border:none;}

  .stencil-id{
    font-family:var(--mono);
    font-size:12px;
    color:var(--accent);
    letter-spacing:1px;
    margin:2px 0 14px;
  }
  .qr-box{
    background:#fff;
    padding:10px;
    border-radius:8px;
    display:inline-flex;
    margin:6px 0 4px;
  }
  .detail-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:14px 0;
  }
  .detail-grid div{
    background:var(--panel-alt);
    border-radius:6px;
    padding:9px 11px;
  }
  .detail-grid .dlabel{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;}
  .detail-grid .dval{font-family:var(--mono);font-size:15px;margin-top:2px;}

  .qty-stepper{
    display:flex;align-items:center;gap:14px;
    justify-content:center;
    margin:16px 0 6px;
  }
  .qty-stepper button{
    width:40px;height:40px;border-radius:50%;
    background:var(--panel-alt);border:1px solid var(--border);
    color:var(--text);font-size:20px;cursor:pointer;
  }
  .qty-stepper .qty-val{font-family:var(--mono);font-size:24px;min-width:44px;text-align:center;}

  .scan-zone{
    display:flex;flex-direction:column;align-items:center;
    padding:36px 10px 10px;
  }
  .nfc-ring{
    width:150px;height:150px;
    border-radius:50%;
    border:2px solid var(--accent);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    margin-bottom:22px;
  }
  .nfc-ring::before, .nfc-ring::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:50%;
    border:2px solid var(--accent);
    opacity:0;
    animation:ping 2.2s ease-out infinite;
  }
  .nfc-ring::after{animation-delay:1.1s;}
  @keyframes ping{
    0%{transform:scale(0.85);opacity:0.7;}
    100%{transform:scale(1.6);opacity:0;}
  }
  .nfc-ring svg{width:56px;height:56px;color:var(--accent);}
  .scan-caption{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:1.5px;
    color:var(--text-muted);
    text-transform:uppercase;
    margin-bottom:26px;
  }
  .scan-caption.active{color:var(--accent);}
  .divider-or{
    display:flex;align-items:center;gap:10px;
    width:100%;color:var(--text-muted);font-size:11px;
    margin:22px 0 16px;
  }
  .divider-or::before, .divider-or::after{
    content:'';flex:1;height:1px;background:var(--border);
  }
  .manual-entry{width:100%;display:flex;gap:8px;}
  .manual-entry input{flex:1;}

  #qr-video{width:100%;border-radius:10px;background:#000;margin-top:6px;}

  .movement-row{
    display:flex;align-items:center;gap:12px;
    padding:11px 0;
    border-bottom:1px solid var(--border);
  }
  .movement-row .m-icon{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:600;font-size:14px;
    flex-shrink:0;
  }
  .m-icon.in{background:rgba(95,167,119,0.15);color:var(--success);}
  .m-icon.out{background:rgba(214,69,69,0.15);color:var(--danger);}
  .movement-row .m-info{flex:1;min-width:0;}
  .movement-row .m-name{font-size:13.5px;font-weight:600;}
  .movement-row .m-meta{font-family:var(--mono);font-size:10.5px;color:var(--text-muted);margin-top:1px;}
  .movement-row .m-qty{font-family:var(--mono);font-weight:600;font-size:14px;}
  .m-qty.in{color:var(--success);}
  .m-qty.out{color:var(--danger);}
  .movement-row .m-tags{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;}
  .m-chip{
    font-size:10px;
    font-family:var(--mono);
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text-muted);
    padding:1px 6px;
    border-radius:3px;
  }

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--text-muted);
  }
  .empty-state .disp{font-family:var(--disp);font-size:15px;color:var(--text);margin-bottom:6px;}
  .toast{
    position:fixed;
    bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 18px;
    border-radius:8px;
    font-size:13px;
    z-index:100;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
    max-width:90%;
    text-align:center;
  }
  ::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div id="app">
  <div class="hazard-strip"></div>
  <header>
    <div class="brand">
      <h1>MAT<span>.</span>LAGER</h1>
      <div class="count" id="itemCount"><span class="conn-dot" id="connDot"></span>0 Artikel</div>
    </div>
  </header>
  <main id="main"></main>
  <div class="fab" id="fab" style="display:none;">
    <button id="fabAdd">+</button>
  </div>
  <nav class="tabs">
    <button data-tab="dashboard" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Übersicht
    </button>
    <button data-tab="scan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a5 5 0 0 1 5 5v1a5 5 0 0 1-2 4"/><path d="M12 22a5 5 0 0 1-5-5v-1a5 5 0 0 1 2-4"/><circle cx="12" cy="12" r="2"/></svg>
      Scan
    </button>
    <button data-tab="articles">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7 12 3 4 7v10l8 4 8-4V7z"/><path d="M4 7l8 4 8-4"/><path d="M12 11v10"/></svg>
      Artikel
    </button>
    <button data-tab="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 7v5l3 3"/></svg>
      Verlauf
    </button>
  </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---- Firebase-Konfiguration ----
const firebaseConfig = {
  apiKey: "AIzaSyD6zaLeNU1ZY-JHFYr-JrbpEUz096m9bfo",
  authDomain: "mat-lager.firebaseapp.com",
  projectId: "mat-lager",
  storageBucket: "mat-lager.firebasestorage.app",
  messagingSenderId: "838703283009",
  appId: "1:838703283009:web:97f4a2e59a3ab44c67bfc0"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

let articles = [];
let movements = [];
let currentTab = 'dashboard';
let qrScanStream = null;
let connected = false;

const $ = sel => document.querySelector(sel);
const main = $('#main');

function setConn(ok){
  connected = ok;
  const dot = $('#connDot');
  if(dot){ dot.className = 'conn-dot ' + (ok ? 'ok' : 'err'); }
}

// ---- Echtzeit-Listener ----
onSnapshot(collection(db, 'articles'), snap => {
  articles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  setConn(true);
  render();
}, err => { setConn(false); toast('Verbindung zur Datenbank fehlgeschlagen'); console.error(err); });

onSnapshot(query(collection(db, 'movements'), orderBy('timestamp', 'desc')), snap => {
  movements = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
}, err => { console.error(err); });

function uid(prefix){
  return prefix + '-' + Math.random().toString(36).slice(2,7).toUpperCase();
}
function genArticleId(category){
  const pre = (category||'MAT').slice(0,3).toUpperCase();
  const existing = articles.filter(a=>a.id.startsWith(pre+'-'));
  const n = existing.length + 1;
  return pre + '-' + String(n).padStart(3,'0');
}
function fmtDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('de-CH',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
}
function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}
function isLow(a){ return a.stock < a.minStock; }
function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML;
}

function render(){
  $('#itemCount').innerHTML = `<span class="conn-dot ${connected?'ok':'err'}" id="connDot"></span>${articles.length} Artikel`;
  $('#fab').style.display = currentTab === 'articles' ? 'flex' : 'none';
  if(currentTab==='dashboard') renderDashboard();
  if(currentTab==='articles') renderArticles();
  if(currentTab==='scan') renderScan();
  if(currentTab==='history') renderHistory();
}

function renderDashboard(){
  const low = articles.filter(isLow);
  const today = new Date().toDateString();
  const todayMoves = movements.filter(m => new Date(m.timestamp).toDateString()===today).length;
  let html = `
    <div class="stat-row">
      <div class="stat-card"><div class="num">${articles.length}</div><div class="label">Artikel gesamt</div></div>
      <div class="stat-card ${low.length? 'warn':''}"><div class="num">${low.length}</div><div class="label">Unter Mindestbestand</div></div>
      <div class="stat-card"><div class="num">${todayMoves}</div><div class="label">Bewegungen heute</div></div>
    </div>
  `;
  if(low.length){
    html += `<h2 class="section-title">Nachbestellen</h2>`;
    low.forEach(a => html += tagCardHtml(a));
  } else {
    html += `<div class="empty-state"><div class="disp">Alles im grünen Bereich</div>Kein Artikel unter Mindestbestand.</div>`;
  }
  main.innerHTML = html;
  bindTagCards();
}

function tagCardHtml(a){
  return `
  <div class="tag-card ${isLow(a)?'low':''}" data-id="${a.id}">
    <div class="info">
      <div class="name">${escapeHtml(a.name)}</div>
      <div class="meta">${a.id} · ${escapeHtml(a.location||'—')}</div>
    </div>
    <div class="stock">${a.stock}<small>Min. ${a.minStock}</small></div>
  </div>`;
}
function bindTagCards(){
  document.querySelectorAll('.tag-card').forEach(el=>{
    el.addEventListener('click', ()=> openArticleDetail(el.dataset.id));
  });
}

function renderArticles(){
  const categories = [...new Set(articles.map(a => a.category || 'Sonstiges'))].sort();
  let html = `<input class="search-bar" id="searchInput" type="text" placeholder="Artikel suchen…">`;
  if(categories.length > 1){
    html += `<div class="filter-row" id="catFilterRow">
      <button class="chip-filter active" data-cat="__all">Alle</button>
      ${categories.map(c => `<button class="chip-filter" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('')}
    </div>`;
  }
  html += `<div id="articleList"></div>`;
  main.innerHTML = html;
  let activeCat = '__all';
  const list = () => {
    const q = ($('#searchInput').value||'').toLowerCase();
    const filtered = articles.filter(a => {
      const matchesQuery = a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q);
      const matchesCat = activeCat === '__all' || (a.category || 'Sonstiges') === activeCat;
      return matchesQuery && matchesCat;
    });
    $('#articleList').innerHTML = filtered.length
      ? filtered.map(tagCardHtml).join('')
      : `<div class="empty-state"><div class="disp">Keine Treffer</div>Versuch eine andere Suche oder Kategorie.</div>`;
    bindTagCards();
  };
  $('#searchInput').addEventListener('input', list);
  if(categories.length > 1){
    $('#catFilterRow').querySelectorAll('.chip-filter').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        $('#catFilterRow').querySelectorAll('.chip-filter').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        list();
      });
    });
  }
  list();
  $('#fabAdd').onclick = openAddArticleSheet;
}

function renderHistory(){
  if(!movements.length){
    main.innerHTML = `<div class="empty-state"><div class="disp">Noch keine Bewegungen</div>Buchungen erscheinen hier chronologisch.</div>`;
    return;
  }
  main.innerHTML = `<input class="search-bar" id="historySearch" type="text" placeholder="Suche nach Person, Kommission oder Artikel…"><div id="historyList"></div>`;
  const list = () => {
    const q = ($('#historySearch').value||'').toLowerCase();
    const filtered = movements.filter(m=>{
      if(!q) return true;
      const a = articles.find(x=>x.id===m.articleId);
      return (m.person||'').toLowerCase().includes(q)
        || (m.komm||'').toLowerCase().includes(q)
        || (a && a.name.toLowerCase().includes(q))
        || m.articleId.toLowerCase().includes(q);
    });
    let html = '<div>';
    if(!filtered.length){
      html = `<div class="empty-state"><div class="disp">Keine Treffer</div>Versuch einen anderen Suchbegriff.</div>`;
    } else {
      filtered.forEach(m=>{
        const a = articles.find(x=>x.id===m.articleId);
        html += `
        <div class="movement-row">
          <div class="m-icon ${m.type}">${m.type==='in'?'↓':'↑'}</div>
          <div class="m-info">
            <div class="m-name">${escapeHtml(a?a.name:'Gelöschter Artikel')}</div>
            <div class="m-meta">${fmtDate(m.timestamp)} · ${m.articleId}</div>
            <div class="m-tags">
              ${m.person ? `<span class="m-chip">${escapeHtml(m.person)}</span>` : ''}
              ${m.komm ? `<span class="m-chip">Komm. ${escapeHtml(m.komm)}</span>` : ''}
            </div>
          </div>
          <div class="m-qty ${m.type}">${m.type==='in'?'+':'−'}${m.qty}</div>
        </div>`;
      });
      html += '</div>';
    }
    $('#historyList').innerHTML = html;
  };
  $('#historySearch').addEventListener('input', list);
  list();
}

function renderScan(){
  const nfcSupported = 'NDEFReader' in window;
  main.innerHTML = `
    <div class="scan-zone">
      <div class="nfc-ring" id="nfcRing">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 2a10 10 0 0 1 0 20"/><path d="M8 7a5 5 0 0 1 0 10"/><circle cx="8" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
      </div>
      <div class="scan-caption" id="scanCaption">${nfcSupported ? 'Bereit zum Scannen' : 'NFC hier nicht verfügbar'}</div>
      <button class="btn btn-primary btn-block" id="nfcBtn">${nfcSupported ? 'NFC-Tag antippen' : 'Nur Android + Chrome'}</button>
      ${!nfcSupported ? '<div style="font-size:12px;color:var(--text-muted);margin-top:8px;text-align:center;">Web NFC funktioniert nicht auf iPhone/Safari. Nutze QR-Code oder manuelle Eingabe.</div>' : ''}

      <div class="divider-or">oder</div>
      <button class="btn btn-secondary btn-block" id="qrBtn">QR-Code scannen</button>
      <video id="qr-video" style="display:none;" playsinline muted></video>

      <div class="divider-or">oder</div>
      <div class="manual-entry">
        <input type="text" id="manualId" placeholder="Artikel-ID eingeben, z. B. SCH-001">
        <button class="btn btn-secondary" id="manualBtn">Suchen</button>
      </div>
    </div>
  `;
  $('#nfcBtn').onclick = startNfcScan;
  $('#qrBtn').onclick = startQrScan;
  $('#manualBtn').onclick = ()=>{
    const val = $('#manualId').value.trim();
    if(val) lookupAndOpen(val);
  };
}

async function startNfcScan(){
  if(!('NDEFReader' in window)){
    toast('Web NFC wird auf diesem Gerät nicht unterstützt');
    return;
  }
  try{
    const reader = new NDEFReader();
    await reader.scan();
    $('#scanCaption').textContent = 'Scanne… Tag antippen';
    $('#scanCaption').classList.add('active');
    reader.onreading = event => {
      let text = '';
      for(const record of event.message.records){
        if(record.recordType === 'text'){
          const decoder = new TextDecoder(record.encoding || 'utf-8');
          text = decoder.decode(record.data);
        }
      }
      if(!text) text = event.serialNumber;
      if(text) lookupAndOpen(text.trim());
    };
    reader.onreadingerror = () => toast('Tag konnte nicht gelesen werden');
  }catch(e){
    toast('NFC-Zugriff verweigert oder fehlgeschlagen');
  }
}

async function startQrScan(){
  const video = $('#qr-video');
  video.style.display = 'block';
  try{
    qrScanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = qrScanStream;
    await video.play();
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const tick = () => {
      if(!qrScanStream) return;
      if(video.readyState === video.HAVE_ENOUGH_DATA){
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height);
        if(code && code.data){
          stopQrScan();
          lookupAndOpen(code.data.trim());
          return;
        }
      }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }catch(e){
    toast('Kamerazugriff nicht möglich');
    video.style.display = 'none';
  }
}
function stopQrScan(){
  if(qrScanStream){
    qrScanStream.getTracks().forEach(t=>t.stop());
    qrScanStream = null;
  }
  const video = $('#qr-video');
  if(video) video.style.display = 'none';
}

function lookupAndOpen(idOrText){
  const article = articles.find(a => a.id.toLowerCase() === idOrText.toLowerCase());
  if(article){
    openArticleDetail(article.id);
  } else {
    toast('Kein Artikel mit ID "' + idOrText + '" gefunden');
  }
}

function openAddArticleSheet(){
  const sheet = buildSheet(`
    <div class="sheet-head"><h3>Neuer Artikel</h3><button class="x" data-close>×</button></div>
    <label>Name</label>
    <input type="text" id="f-name" placeholder="z. B. Schrauben M6x30">
    <label>Kategorie</label>
    <input type="text" id="f-cat" placeholder="z. B. Schrauben">
    <label>Standort</label>
    <input type="text" id="f-loc" placeholder="z. B. Regal A2">
    <label>Startbestand</label>
    <input type="number" id="f-stock" value="0" min="0">
    <label>Mindestbestand</label>
    <input type="number" id="f-min" value="10" min="0">
    <div class="btn-row">
      <button class="btn btn-secondary btn-block" data-close>Abbrechen</button>
      <button class="btn btn-primary btn-block" id="saveArticle">Anlegen</button>
    </div>
  `);
  sheet.querySelector('#saveArticle').onclick = async ()=>{
    const btn = sheet.querySelector('#saveArticle');
    const name = sheet.querySelector('#f-name').value.trim();
    if(!name){ toast('Bitte einen Namen eingeben'); return; }
    const category = sheet.querySelector('#f-cat').value.trim() || 'Sonstiges';
    const newId = genArticleId(category);
    const article = {
      name,
      category,
      location: sheet.querySelector('#f-loc').value.trim(),
      stock: parseInt(sheet.querySelector('#f-stock').value)||0,
      minStock: parseInt(sheet.querySelector('#f-min').value)||0,
      createdAt: Date.now()
    };
    btn.disabled = true; btn.textContent = 'Speichere…';
    try{
      await setDoc(doc(db, 'articles', newId), article);
      closeSheet();
      openArticleDetail(newId, true);
    }catch(e){
      toast('Speichern fehlgeschlagen – Verbindung prüfen');
      btn.disabled = false; btn.textContent = 'Anlegen';
      console.error(e);
    }
  };
}

function openArticleDetail(id, justCreated){
  const a = articles.find(x=>x.id===id);
  if(!a){ toast('Artikel nicht gefunden'); return; }
  const sheet = buildSheet(`
    <div class="sheet-head"><h3>${escapeHtml(a.name)}</h3><button class="x" data-close>×</button></div>
    <div class="stencil-id">TAG · ${a.id}</div>
    ${justCreated ? `<div style="font-size:12.5px;color:var(--text-muted);margin-bottom:10px;">Artikel angelegt. Jetzt einen leeren NFC-Tag beschreiben oder den QR-Code ausdrucken und am Lagerplatz anbringen.</div>` : ''}
    <div style="display:flex;gap:16px;align-items:flex-start;">
      <div>
        <div class="qr-box" id="qrHolder"></div>
      </div>
      <div style="flex:1;">
        <button class="btn btn-secondary btn-block" id="writeNfcBtn" style="margin-bottom:8px;">Tag beschreiben (NFC)</button>
        <div style="font-size:11px;color:var(--text-muted);">Leeren Tag ans Handy halten, ID wird geschrieben.</div>
      </div>
    </div>
    <div class="detail-grid">
      <div><div class="dlabel">Bestand</div><div class="dval">${a.stock}</div></div>
      <div><div class="dlabel">Mindestbestand</div><div class="dval">${a.minStock}</div></div>
      <div><div class="dlabel">Standort</div><div class="dval">${escapeHtml(a.location||'—')}</div></div>
      <div><div class="dlabel">Kategorie</div><div class="dval">${escapeHtml(a.category||'—')}</div></div>
    </div>
    <label style="text-align:center;">Buchung</label>
    <div class="qty-stepper">
      <button data-step="-1">−</button>
      <div class="qty-val" id="qtyVal">1</div>
      <button data-step="1">+</button>
    </div>
    <label>Person</label>
    <input type="text" id="f-person" placeholder="Wer bezieht/liefert das Material?">
    <label>Kommissionsnr. <span style="text-transform:none;letter-spacing:0;">(optional)</span></label>
    <input type="text" id="f-komm" placeholder="z. B. Auftrag/Projekt-Nr.">
    <div class="btn-row">
      <button class="btn btn-danger btn-block" id="bookOut">Entnahme</button>
      <button class="btn btn-success btn-block" id="bookIn">Einlagerung</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary btn-block" id="editArticle">Artikel bearbeiten</button>
      <button class="btn btn-secondary btn-block" id="deleteArticle">Löschen</button>
    </div>
  `);

  // Buttons zuerst verknüpfen, damit ein Fehler bei QR/Storage sie nie blockiert.
  let qty = 1;
  const qtyVal = sheet.querySelector('#qtyVal');
  sheet.querySelectorAll('[data-step]').forEach(btn=>{
    btn.onclick = ()=>{
      qty = Math.max(1, qty + parseInt(btn.dataset.step));
      qtyVal.textContent = qty;
    };
  });

  sheet.querySelector('#bookIn').onclick = async ()=>{
    const person = sheet.querySelector('#f-person').value.trim();
    const komm = sheet.querySelector('#f-komm').value.trim();
    await book(a.id, 'in', qty, person, komm);
  };
  sheet.querySelector('#bookOut').onclick = async ()=>{
    const person = sheet.querySelector('#f-person').value.trim();
    const komm = sheet.querySelector('#f-komm').value.trim();
    if(!person){ toast('Bitte Person angeben, wer das Material bezieht'); return; }
    const fresh = articles.find(x=>x.id===a.id);
    if(fresh && qty > fresh.stock){ toast('Nicht genug Bestand für diese Entnahme'); return; }
    await book(a.id, 'out', qty, person, komm);
  };
  sheet.querySelector('#editArticle').onclick = ()=>{
    closeSheet();
    openEditArticleSheet(a.id);
  };
  sheet.querySelector('#deleteArticle').onclick = async ()=>{
    try{
      await deleteDoc(doc(db, 'articles', a.id));
      closeSheet();
      toast('Artikel gelöscht');
    }catch(e){
      toast('Löschen fehlgeschlagen');
      console.error(e);
    }
  };
  sheet.querySelector('#writeNfcBtn').onclick = async ()=>{
    if(!('NDEFReader' in window)){
      toast('Web NFC wird auf diesem Gerät nicht unterstützt');
      return;
    }
    try{
      const writer = new NDEFReader();
      await writer.write({ records: [{ recordType: 'text', data: a.id }] });
      toast('Tag erfolgreich beschrieben: ' + a.id);
    }catch(e){
      toast('Schreiben fehlgeschlagen oder abgebrochen');
    }
  };

  try{
    new QRCode(sheet.querySelector('#qrHolder'), { text: a.id, width: 96, height: 96, colorDark:'#1b1d1f', colorLight:'#ffffff' });
  }catch(e){
    sheet.querySelector('#qrHolder').innerHTML = `<div style="width:96px;height:96px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;text-align:center;padding:4px;">QR nicht verfügbar</div>`;
  }

  const lastPerson = localStorage.getItem('mat-lager-last-person');
  if(lastPerson) sheet.querySelector('#f-person').value = lastPerson;
}

function openEditArticleSheet(id){
  const a = articles.find(x=>x.id===id);
  if(!a) return;
  const sheet = buildSheet(`
    <div class="sheet-head"><h3>Artikel bearbeiten</h3><button class="x" data-close>×</button></div>
    <div class="stencil-id">TAG · ${a.id} (ID bleibt unverändert)</div>
    <label>Name</label>
    <input type="text" id="f-name" value="${escapeHtml(a.name)}">
    <label>Kategorie</label>
    <input type="text" id="f-cat" value="${escapeHtml(a.category||'')}">
    <label>Standort</label>
    <input type="text" id="f-loc" value="${escapeHtml(a.location||'')}">
    <label>Bestand</label>
    <input type="number" id="f-stock" value="${a.stock}" min="0">
    <label>Mindestbestand</label>
    <input type="number" id="f-min" value="${a.minStock}" min="0">
    <div style="font-size:11.5px;color:var(--text-muted);margin-top:10px;">
      Hinweis: Eine manuelle Bestandsänderung hier wird nicht als Ein-/Auslagerung im Verlauf protokolliert.
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary btn-block" data-close>Abbrechen</button>
      <button class="btn btn-primary btn-block" id="saveEdit">Speichern</button>
    </div>
  `);
  sheet.querySelector('#saveEdit').onclick = async ()=>{
    const btn = sheet.querySelector('#saveEdit');
    const name = sheet.querySelector('#f-name').value.trim();
    if(!name){ toast('Bitte einen Namen eingeben'); return; }
    btn.disabled = true; btn.textContent = 'Speichere…';
    try{
      await updateDoc(doc(db, 'articles', a.id), {
        name,
        category: sheet.querySelector('#f-cat').value.trim() || 'Sonstiges',
        location: sheet.querySelector('#f-loc').value.trim(),
        stock: parseInt(sheet.querySelector('#f-stock').value)||0,
        minStock: parseInt(sheet.querySelector('#f-min').value)||0
      });
      closeSheet();
      toast('Artikel aktualisiert');
    }catch(e){
      toast('Speichern fehlgeschlagen');
      btn.disabled = false; btn.textContent = 'Speichern';
      console.error(e);
    }
  };
}

async function book(articleId, type, qty, person, komm){
  try{
    await updateDoc(doc(db, 'articles', articleId), {
      stock: increment(type==='in' ? qty : -qty)
    });
    await addDoc(collection(db, 'movements'), {
      articleId, type, qty, person: person||'', komm: komm||'', timestamp: Date.now()
    });
    if(person) localStorage.setItem('mat-lager-last-person', person);
    closeSheet();
    toast((type==='in' ? 'Eingelagert: ' : 'Entnommen: ') + qty + 'x' + (person ? ' · ' + person : ''));
  }catch(e){
    toast('Buchung fehlgeschlagen – Verbindung prüfen');
    console.error(e);
  }
}

function buildSheet(innerHtml){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `<div class="sheet">${innerHtml}</div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeSheet(); });
  overlay.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click', closeSheet));
  return overlay;
}
function closeSheet(){
  stopQrScan();
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
}

document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    stopQrScan();
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  });
});

render();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
